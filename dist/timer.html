<!doctype html>
<html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PIM Tomato — Timer</title>
<style>
  :root{--bg:#1f1e1d;--cyan:#00ffe3;--ink:#0c3b37;--mut:rgba(255,255,255,.55)}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
  html,body{background:transparent;font-family:-apple-system,"Metropolis",Segoe UI,sans-serif;overflow:hidden}
  #box{position:relative;margin:6px;border-radius:15px;padding:10px 12px 11px;color:#fff;box-shadow:0 10px 28px rgba(0,0,0,.42);
    background:linear-gradient(var(--bg),var(--bg)) padding-box,linear-gradient(135deg,#00ffe3,#00b6a2 55%,#008987) border-box;
    border:1.6px solid transparent}
  #box.brk{background:var(--cyan);color:var(--ink)}
  .top{display:flex;align-items:center;gap:6px}
  .ey{flex:1;font-size:8px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #box.brk .ey{color:rgba(12,59,55,.7)}
  .hbtn{width:19px;height:19px;border-radius:6px;border:none;background:rgba(255,255,255,.10);color:#fff;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center}
  .hbtn:hover{background:rgba(255,255,255,.22)}
  .hbtn.on{background:var(--cyan);color:var(--ink)}
  .hbtn svg{width:12px;height:12px}
  #box.brk .hbtn{background:rgba(12,59,55,.14);color:var(--ink)}
  .task{font-weight:800;font-size:14px;line-height:1.2;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .path{font-size:9.5px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--mut)}
  .path .tp-area,.path .tp-list{color:rgba(255,255,255,.62)}
  .path .tp-client{color:var(--cyan);font-weight:700}
  .path .tp-sep{margin:0 6px;color:rgba(255,255,255,.3)}
  .row{display:flex;align-items:center;gap:7px;margin-top:9px}
  .ccol{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
  .clock{font-size:22px;font-weight:800;color:var(--cyan);font-variant-numeric:tabular-nums;letter-spacing:.01em;line-height:1}
  .paused .clock{color:var(--mut)}
  .skip{align-self:flex-start;font-size:9px;font-weight:800;color:#f0b330;background:rgba(240,179,48,.16);border-radius:6px;padding:2px 6px;font-variant-numeric:tabular-nums}
  #box.brk .skip{color:#8a5a00;background:rgba(12,59,55,.12)}
  .b{border:none;border-radius:9px;font-weight:800;font-size:12px;cursor:pointer;padding:8px 12px;white-space:nowrap}
  .fin{background:var(--cyan);color:var(--ink)}
  .pau{background:rgba(255,255,255,.12);color:#fff;padding:8px 9px;display:flex;align-items:center}
  .pau svg{width:13px;height:13px;display:block}
  .track{height:4px;border-radius:4px;background:rgba(255,255,255,.12);margin-top:9px;overflow:hidden}
  .track i{display:block;height:100%;background:var(--cyan);width:0%;transition:width .3s linear}
  .brktitle{font-weight:800;font-size:15px;margin-top:5px}
  .b-yes{background:var(--ink);color:var(--cyan)}
  .b-no{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
  .idle{color:var(--mut);font-size:11px;text-align:center;padding:9px 0 4px}
  .hide{display:none}
</style></head>
<body>
<div id="box">
  <div class="top" data-tauri-drag-region>
    <span class="ey" id="ey">—</span>
    <button class="hbtn" id="pin" title="Fissa in alto a destra"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.8V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v5.8l1.7 2A1 1 0 0 1 16.9 14H7.1a1 1 0 0 1-.8-1.2z"/></svg></button>
    <button class="hbtn" id="x" title="Chiudi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
  </div>
  <div id="run">
    <div class="task" id="task">—</div>
    <div class="path" id="path"></div>
    <div class="row">
      <div class="ccol">
        <span class="clock" id="clock">0:00:00</span>
        <span class="skip hide" id="skip"></span>
      </div>
      <button class="b fin" id="fin">✓ finito</button>
      <button class="b pau" id="pau" title="Pausa"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg></button>
    </div>
    <div class="track"><i id="bar"></i></div>
  </div>
  <div id="brk" class="hide">
    <div class="brktitle" id="brktitle">Top! ora fai una pausina?</div>
    <div class="row" id="brkbtns" style="margin-top:10px">
      <button class="b b-yes" id="byes" style="flex:1">sì</button>
      <button class="b b-no" id="bno" style="flex:1">no, la prossima</button>
    </div>
  </div>
  <div id="idle" class="idle hide">nessun blocco attivo</div>
</div>
<script>
(function(){
  var T=window.__TAURI__, ev=T&&T.event;
  var st={active:false,idx:0,total:0,task:'',path:'',endTs:0,totalSec:1,paused:false,remaining:0};
  var mode='run', pinned=false;
  function $(id){return document.getElementById(id)}
  var box=$('box');
  function p2(x){return(x<10?'0':'')+x}
  function hms(s){s=Math.max(0,Math.floor(s));var h=Math.floor(s/3600),m=Math.floor(s%3600/60),x=s%60;return h+':'+p2(m)+':'+p2(x)}
  function sh(el,on){el.classList.toggle('hide',!on)}
  function render(){
    if(mode==='brk'){sh($('run'),false);sh($('brk'),true);sh($('idle'),false);box.classList.add('brk');return}
    box.classList.remove('brk');
    if(!st.active){sh($('run'),false);sh($('brk'),false);sh($('idle'),true);$('ey').textContent='PIM Tomato';return}
    sh($('run'),true);sh($('brk'),false);sh($('idle'),false);
    $('ey').textContent='ora lavori su · blocco '+(st.idx+1)+' di '+st.total;
    $('task').textContent=st.task||'—';
    $('path').innerHTML=st.path||'';
    box.classList.toggle('paused',!!st.paused);
    var sk=Math.round(st.skipped||0);
    if(sk>0){$('skip').textContent=hms(sk)+' saltati'}
    sh($('skip'),sk>0);
    tick();
  }
  function tick(){
    if(mode!=='run'||!st.active)return;
    var left=st.paused?st.remaining:(st.endTs-Date.now()/1000);
    $('clock').textContent=hms(left);
    var total=st.totalSec||1,pct=Math.min(100,Math.max(0,(total-left)/total*100));
    $('bar').style.width=pct+'%';
  }
  setInterval(tick,250);
  if(ev)ev.listen('pt-state',function(e){st=Object.assign(st,e.payload||{});mode='run';render();});
  function act(o){try{ev.emit('pt-timer-action',o)}catch(_){}}
  $('fin').addEventListener('click',function(){act({a:'finish'});mode='brk';render()});
  $('pau').addEventListener('click',function(){act({a:st.paused?'resume':'pause'})});
  $('byes').addEventListener('click',function(){act({a:'break'});$('brktitle').textContent='Perfetto, a dopo!';$('brkbtns').classList.add('hide')});
  $('bno').addEventListener('click',function(){act({a:'next'});mode='run';render()});
  $('x').addEventListener('click',function(){act({a:'hide'})});
  $('pin').addEventListener('click',function(){pinned=!pinned;$('pin').classList.toggle('on',pinned);$('pin').title=pinned?'Sfissa (torna sotto la barra dei menu)':'Fissa in alto a destra';act({a:'pin',on:pinned})});
  render();
})();
</script>
</body></html>
